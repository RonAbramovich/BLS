<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggregated BLS Signature - Interactive Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .language-switch a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s;
            margin: 0 5px;
        }

        .language-switch a:hover {
            background: rgba(255,255,255,0.3);
        }

        .content {
            padding: 30px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .input-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 0.9em;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 0.9em;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            padding: 8px 16px;
            font-size: 0.85em;
            width: auto;
        }

        .participants-container {
            margin-top: 20px;
        }

        .participant-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .participant-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .remove-participant {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .add-participant-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .results-section {
            margin-top: 30px;
        }

        .step {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .step:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .step-title {
            flex: 1;
            margin-left: 15px;
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .step-result {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #666;
            white-space: pre-wrap;
        }

        .individual-signature {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .individual-signature h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .final-result {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 25px;
            text-align: center;
        }

        .final-result.failed {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .final-result h3 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffe0e0;
            color: #cc0000;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }

        .detail-section {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }

        .detail-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .detail-item {
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #666;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="language-switch">
        <a href="index-en.html">Regular Signature</a>
        <a href="aggregated.html">עברית</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>Aggregated BLS Signature</h1>
            <p>Demonstrating multi-signature aggregation and joint verification</p>
        </div>

        <div class="content">
            <!-- STEP 1: Curve Parameters -->
            <div class="input-section">
                <h2>Step 1: Select Curve Parameters</h2>
                
                <div class="form-group">
                    <label for="primeQ">Prime q (Field Characteristic):</label>
                    <input type="text" id="primeQ" value="43" placeholder="e.g., 43">
                    <small>Must be prime and q ≡ 3 (mod 4)</small>
                </div>

                <div class="form-group">
                    <label for="paramA">Parameter A (for y² = x³ + Ax + B):</label>
                    <input type="text" id="paramA" value="1" placeholder="e.g., 1">
                </div>

                <div class="form-group">
                    <label for="paramB">Parameter B (for y² = x³ + Ax + B):</label>
                    <input type="text" id="paramB" value="8" placeholder="e.g., 8">
                    <small>Must satisfy: 4A³ + 27B² ≠ 0</small>
                </div>

                <button class="btn" onclick="showPrivateKeyConstraints()" id="validateBtn">
                    Validate Parameters & Show Private Key Constraints
                </button>
            </div>

            <div id="loadingSection" class="hidden">
                <div class="loader"></div>
                <p style="text-align: center; color: #666;">Computing...</p>
            </div>

            <div id="errorSection" class="hidden error-message"></div>

            <div id="constraintsSection" class="results-section hidden"></div>

            <!-- STEP 3: Participants Management -->
            <div id="participantsSection" class="input-section hidden" style="margin-top: 20px;">
                <h2>Step 3: Add Participants and Sign</h2>
                
                <div class="form-group">
                    <label for="message">Message to Sign (shared by all participants):</label>
                    <input type="text" id="message" value="hello" placeholder="Enter any message">
                </div>

                <div id="participantsList" class="participants-container">
                    <!-- Participants will be added here dynamically -->
                </div>

                <button class="btn add-participant-btn" onclick="addParticipant()">
                    <span style="font-size: 1.5em;">+</span>
                    Add Participant
                </button>

                <div style="margin-top: 20px;">
                    <button class="btn" onclick="generateAggregatedSignature()" id="submitBtn" disabled>
                        Compute Aggregated Signatures & Verify
                    </button>
                </div>
            </div>

            <div id="resultsSection" class="results-section hidden"></div>
        </div>
    </div>

    <script>
        let participantCount = 0;
        let validPrivateKeys = [];

        function addParticipant() {
            participantCount++;
            const participantsList = document.getElementById('participantsList');
            
            const participantCard = document.createElement('div');
            participantCard.className = 'participant-card';
            participantCard.id = `participant-${participantCount}`;
            
            participantCard.innerHTML = `
                <button class="btn btn-danger remove-participant" onclick="removeParticipant(${participantCount})">
                    ✕ Remove
                </button>
                <h3>Participant ${participantCount}</h3>
                <div class="form-group">
                    <label for="name-${participantCount}">Participant Name:</label>
                    <input type="text" id="name-${participantCount}" placeholder="e.g., Alice">
                </div>
                <div class="form-group">
                    <label for="key-${participantCount}">Private Key:</label>
                    <select id="key-${participantCount}" class="participant-key">
                        <option value="">-- Select a valid key --</option>
                        ${validPrivateKeys.map(key => `<option value="${key}">${key}</option>`).join('')}
                    </select>
                </div>
            `;
            
            participantsList.appendChild(participantCard);
            updateSubmitButton();
        }

        function removeParticipant(id) {
            const participant = document.getElementById(`participant-${id}`);
            if (participant) {
                participant.remove();
            }
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const participants = document.querySelectorAll('.participant-card');
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = participants.length < 2;
        }

        async function showPrivateKeyConstraints() {
            const validateBtn = document.getElementById('validateBtn');
            const loadingSection = document.getElementById('loadingSection');
            const errorSection = document.getElementById('errorSection');
            const constraintsSection = document.getElementById('constraintsSection');

            constraintsSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            constraintsSection.innerHTML = '';

            validateBtn.disabled = true;
            loadingSection.classList.remove('hidden');

            try {
                const response = await fetch('/api/aggregated/private-key-constraints', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        PRIME_Q: document.getElementById('primeQ').value,
                        A: document.getElementById('paramA').value,
                        B: document.getElementById('paramB').value,
                        Language: 'en'
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.errorMessage || 'Unknown error');
                }

                displayConstraints(data);
            } catch (error) {
                errorSection.textContent = `Error: ${error.message}`;
                errorSection.classList.remove('hidden');
            } finally {
                validateBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        }

        function displayConstraints(data) {
            const constraintsSection = document.getElementById('constraintsSection');
            let html = '<h2 style="color: #667eea; margin-bottom: 20px;">Step 2: Private Key Constraints</h2>';

            html += `
                <div class="detail-section">
                    <h3>Curve Details</h3>
                    <div class="detail-item">
                        <div class="detail-label">Prime (p):</div>
                        <div class="detail-value">${data.prime}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Curve Equation:</div>
                        <div class="detail-value">${data.curveEquation}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Group Order:</div>
                        <div class="detail-value">${data.groupOrder}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Generator Order (r):</div>
                        <div class="detail-value">${data.r}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Generator Point:</div>
                        <div class="detail-value">${data.generatorPoint}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>${data.constraintDescription}</h3>
                    <div class="detail-item">
                        <div class="detail-label">Validation Rule:</div>
                        <div class="detail-value" style="white-space: pre-wrap;">${data.validationRule}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>Detailed Explanation</h3>
                    <div class="detail-item">
                        <div class="detail-value" style="white-space: pre-wrap;">${data.explanation}</div>
                    </div>
                </div>

            `;

            constraintsSection.innerHTML = html;
            constraintsSection.classList.remove('hidden');

            validPrivateKeys = data.validKeyExamples;
            document.getElementById('participantsSection').classList.remove('hidden');

            addParticipant();
            addParticipant();

            constraintsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function generateAggregatedSignature() {
            const submitBtn = document.getElementById('submitBtn');
            const loadingSection = document.getElementById('loadingSection');
            const errorSection = document.getElementById('errorSection');
            const resultsSection = document.getElementById('resultsSection');

            const participants = [];
            const participantCards = document.querySelectorAll('.participant-card');
            
            for (const card of participantCards) {
                const id = card.id.split('-')[1];
                const name = document.getElementById(`name-${id}`).value.trim();
                const privateKey = document.getElementById(`key-${id}`).value;

                if (!name) {
                    errorSection.textContent = 'Error: Please enter a name for all participants';
                    errorSection.classList.remove('hidden');
                    return;
                }

                if (!privateKey) {
                    errorSection.textContent = 'Error: Please select a private key for all participants';
                    errorSection.classList.remove('hidden');
                    return;
                }

                participants.push({ Name: name, PrivateKey: privateKey });
            }

            resultsSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            resultsSection.innerHTML = '';

            submitBtn.disabled = true;
            loadingSection.classList.remove('hidden');

            try {
                const response = await fetch('/api/aggregated/sign', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        PRIME_Q: document.getElementById('primeQ').value,
                        A: document.getElementById('paramA').value,
                        B: document.getElementById('paramB').value,
                        Message: document.getElementById('message').value,
                        Participants: participants,
                        Language: 'en',
                        IncludeDetailedReport: true
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.errorMessage || 'Unknown error');
                }

                displayResults(data);
            } catch (error) {
                errorSection.textContent = `Error: ${error.message}`;
                errorSection.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        }

        function displayResults(data) {
            const resultsSection = document.getElementById('resultsSection');
            let html = '<h2 style="color: #667eea; margin-bottom: 20px;">Aggregated Signature Results</h2>';

            html += '<h3 style="color: #667eea; margin: 20px 0;">Common Steps</h3>';
            let stepNum = 1;
            data.commonSteps.forEach(step => {
                html += `
                    <div class="step">
                        <div class="step-header">
                            <div class="step-number">${stepNum++}</div>
                            <div class="step-title">${step.description}</div>
                        </div>
                        <div class="step-result">${step.result}</div>
                    </div>
                `;
            });

            html += '<h3 style="color: #667eea; margin: 20px 0;">Individual Signatures</h3>';
            data.individualSignatures.forEach(sig => {
                html += `
                    <div class="individual-signature">
                        <h4>👤 ${sig.participantName}</h4>
                        <p><strong>Private Key:</strong> ${sig.privateKey}</p>
                        <p><strong>Public Key:</strong> ${sig.publicKey}</p>
                        <p><strong>Signature:</strong> ${sig.signature}</p>
                    </div>
                `;
            });

            html += `
                <div class="detail-section" style="margin-top: 20px;">
                    <h3>Aggregation Summary</h3>
                    <div class="detail-item">
                        <div class="detail-label">Aggregated Public Key:</div>
                        <div class="detail-value">${data.aggregatedPublicKey}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Aggregated Signature:</div>
                        <div class="detail-value">${data.aggregatedSignature}</div>
                    </div>
                </div>
            `;

            const passedClass = data.verificationPassed ? '' : 'failed';
            const statusText = data.verificationPassed ? '✓ Verification Passed!' : '✗ Verification Failed!';
            const explanationText = data.verificationPassed 
                ? 'All signatures were successfully verified using a single bilinear pairing!'
                : 'The pairings do not match - there is an issue with one of the signatures';

            html += `
                <div class="final-result ${passedClass}">
                    <h3>${statusText}</h3>
                    <p style="margin-top: 15px; font-size: 1.1em;">${explanationText}</p>
                    <p style="margin-top: 10px; font-size: 0.95em; opacity: 0.9;">
                        e(σ<sub>agg</sub>, Q) = e(H(m), Q)<sup>(Σ sk<sub>i</sub>)</sup>
                    </p>
                </div>
            `;

            resultsSection.innerHTML = html;
            resultsSection.classList.remove('hidden');

            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
